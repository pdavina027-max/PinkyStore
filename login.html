<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PinkyStore — Admin Login ✨</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="pinky-admin-body">

  <header class="pinky-admin-header">
    <div class="logo">PinkyStore <span style="font-size: 16px; color: #666; font-family: 'Poppins';">— Admin System 👑</span></div>
  </header>

  <main class="pinky-login-container">
    <div class="pinky-login-box">
      <div class="pinky-login-title">
        🔑 LOGIN ADMIN
      </div>
      
      <form action="admin.html" method="GET" onsubmit="alert('Login sukses, selamat bekerja Admin imut! ✨💖')">
        <div class="pinky-form-group">
          <label>Username Admin</label>
          <input type="text" placeholder="Masukkan username admin..." required>
        </div>
        
        <div class="pinky-form-group">
          <label>Password</label>
          <input type="password" placeholder="••••••••" required>
        </div>
        
        <button type="submit" class="btn pink" style="width: 100%; margin-top: 10px; border-radius: 16px;">
          MASUK SYSTEM →
        </button>
      </form>
      
      <a href="#" class="pinky-forgot-link" onclick="alert('Hubungi Owner utama untuk reset password ya! 👑')">Lupa password?</a>
    </div>
  </main>

  <footer>
    © 2026 PinkyStore Roblox Top Up 💖 | Admin Secure Panel
  </footer>

</body>
</html>
